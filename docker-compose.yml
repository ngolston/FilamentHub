services:
  # ── FilamentHub API ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/filamenthub.db
      DATA_DIR: /app/data
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-use-openssl-rand-hex-32}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:ro       # hot-reload in dev
      - app_data:/app/data      # SQLite db + uploaded photos

  # ── Frontend dev server ─────────────────────────────────────────────────────
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ""
      VITE_API_TARGET: "http://api:8000"  # Docker service name, not localhost
    depends_on:
      - api
    profiles:
      - dev

  # ── Nginx reverse proxy (production) ───────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - frontend_build:/usr/share/nginx/html:ro
    profiles:
      - production  # only starts with: docker compose --profile production up

volumes:
  app_data:
  frontend_node_modules:
  frontend_build:
