# FilamentHub — self-host nginx config (HTTP only, no TLS)
# For a home server or NAS where HTTPS is handled upstream (reverse proxy, Traefik, etc.)
# or not needed at all (local LAN).

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml;

    # Increase for photo uploads
    client_max_body_size 25M;

    upstream api {
        server api:8000;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        # ── Uploaded media (photos served by FastAPI StaticFiles) ────────────
        location /media/ {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
            expires 7d;
            add_header Cache-Control "public";
        }

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 120s;
        }

        # ── API docs (dev / troubleshooting) ──────────────────────────────────
        location ~ ^/(docs|redoc|openapi\.json)$ {
            proxy_pass       http://api;
            proxy_set_header Host $host;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            proxy_pass http://api;
        }

        # ── Frontend (SPA) ────────────────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;

            # SPA: all unknown routes serve index.html
            try_files $uri $uri/ /index.html;

            # Cache busted assets (Vite adds content-hash to filenames)
            location ~* \.(js|css|woff2?|ttf|svg|png|jpg|webp|ico)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
