<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>FilamentHub</title>
    <!-- Apply stored theme immediately to avoid flash of wrong theme -->
    <script>
      (function () {
        var valid = ['theme-dark','theme-soft-dark','theme-muted-dark','theme-high-contrast','theme-light'];
        try {
          var raw = localStorage.getItem('fh_theme');
          var parsed = raw ? JSON.parse(raw) : null;
          var theme = valid.includes(parsed) ? parsed : 'theme-dark';
        } catch (e) {
          var theme = 'theme-dark';
        }
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
